name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read
  issues: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;

            // Required: "<Project Name> | <Roll Number>"
            // Enforces spaces around the pipe and alphanumeric roll number.
            const regex = /^.+ \| [A-Za-z0-9]+$/;

            if (!regex.test(title)) {
              const body = [
                "❌ **Invalid Pull Request Title Format**",
                "",
                "**Required Format:**",
                "`<Project Name> | <Roll Number>`",
                "",
                "**Rules:**",
                '- Must include spaces on BOTH sides of `|`',
                "- Roll number should be alphanumeric (e.g., `22A51A0001`)",
                "",
                "**Examples:**",
                "✅ `AI Chatbot | 22A51A0001`",
                "🚫 `AI Chatbot|22A51A0001`",
                "",
                `**Current title:** \`${title}\``,
                "",
                "👉 Please edit your PR title and try again."
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });

              core.setFailed("Invalid Pull Request Title Format (see PR comment).");
            }
